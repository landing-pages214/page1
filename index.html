<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Our Community</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen;
    }

    body, html {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
    }

    .container {
      display: flex;
      height: 100vh;
      flex-direction: row;
    }

    .image-section {
      flex: 1;
      background: url('Screenshot_20260418-170007~2.png') center/cover no-repeat;
    }

    .content-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #0f172a;
    }

    .content {
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }

    p {
      margin-bottom: 25px;
      color: #cbd5f5;
      line-height: 1.5;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input[type="email"] {
      padding: 14px;
      border: none;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    button {
      padding: 14px;
      background: #6366f1;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #4f46e5;
    }

    .note {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .image-section {
        height: 40%;
      }

      .content-section {
        height: 60%;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- LEFT IMAGE -->
  <div class="image-section"></div>

  <!-- RIGHT CONTENT -->
  <div class="content-section">
    <div class="content">
      <h1>Get a Free Coffee</h1>
      <p>By joining our email list to get updates, insights and promotions.</p>

      <!-- Replace action URL with your Formspree / email service -->
      <form action="https://formspree.io/f/xkokbzvk" method="POST">
        <input type="email" name="email" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
      </form>

      <div class="note">We respect your privacy. Unsubscribe anytime.</div>
    </div>
  </div>

</div>

</body>
</html>
